<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background hexagon (swarm/honeycomb motif) -->
  <path d="M256 32 L444 140 L444 372 L256 480 L68 372 L68 140 Z"
        stroke="#00ff9c" stroke-width="3" fill="none" opacity="0.15"/>
  <path d="M256 64 L420 158 L420 354 L256 448 L92 354 L92 158 Z"
        stroke="#00ff9c" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Inner hexagon (solid, subtle) -->
  <path d="M256 100 L392 178 L392 334 L256 412 L120 334 L120 178 Z"
        fill="#06060a" stroke="#1f1f2c" stroke-width="1.5"/>

  <!-- Three converging node paths (swarm agents meeting) -->
  <!-- Agent 1 from top-left -->
  <circle cx="160" cy="160" r="6" fill="#00ff9c" opacity="0.6"/>
  <line x1="160" y1="160" x2="256" y2="256" stroke="#00ff9c" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Agent 2 from top-right -->
  <circle cx="352" cy="160" r="6" fill="#ff2d8a" opacity="0.6"/>
  <line x1="352" y1="160" x2="256" y2="256" stroke="#ff2d8a" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Agent 3 from bottom -->
  <circle cx="256" cy="380" r="6" fill="#00d4ff" opacity="0.6"/>
  <line x1="256" y1="380" x2="256" y2="256" stroke="#00d4ff" stroke-width="1.5" opacity="0.4" stroke-dasharray="6 4"/>

  <!-- Central node (coordination point) -->
  <circle cx="256" cy="256" r="14" fill="#06060a" stroke="#00ff9c" stroke-width="2.5"/>
  <circle cx="256" cy="256" r="6" fill="#00ff9c"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="22" fill="none" stroke="#00ff9c" stroke-width="0.5" opacity="0.3"/>

  <!-- "SH" monogram in terminal font style -->
  <text x="256" y="270" text-anchor="middle" font-family="monospace" font-weight="700" font-size="0" fill="#00ff9c">
    <!-- Hidden — the visual IS the hexagon+nodes, not text -->
  </text>
</svg>
