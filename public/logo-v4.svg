<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- V4: CONNECTED HEXAGONS — 3 hexagons linked as a molecule/network -->
  <!-- Clean, flat, Figma-style. Each hex is an agent. Bonds = coordination. -->
  <defs>
    <linearGradient id="g4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff9c"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>

  <!-- Bond lines (behind hexagons) -->
  <line x1="196" y1="196" x2="316" y2="196" stroke="#2D3436" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="196" x2="256" y2="340" stroke="#2D3436" stroke-width="16" stroke-linecap="round"/>

  <!-- Hex 1: top-left (agent A) -->
  <g transform="translate(168,168)">
    <polygon points="0,-56 48,-28 48,28 0,56 -48,28 -48,-28" fill="url(#g4)"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="white" opacity="0.9"/>
  </g>

  <!-- Hex 2: top-right (agent B) -->
  <g transform="translate(344,168)">
    <polygon points="0,-56 48,-28 48,28 0,56 -48,28 -48,-28" fill="#FF2D8A"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="white" opacity="0.9"/>
  </g>

  <!-- Hex 3: bottom-center (agent C) — slightly larger, the coordinator -->
  <g transform="translate(256,356)">
    <polygon points="0,-64 56,-32 56,32 0,64 -56,32 -56,-32" fill="#2D3436"/>
    <polygon points="0,-36 30,-18 30,18 0,36 -30,18 -30,-18" fill="url(#g4)"/>
    <!-- Arrow inside: this agent is moving -->
    <polygon points="-8,-10 12,0 -8,10" fill="white"/>
  </g>

  <!-- Small connection dots at bond midpoints -->
  <circle cx="256" cy="168" r="8" fill="white"/>
  <circle cx="212" cy="268" r="8" fill="white"/>
  <circle cx="300" cy="268" r="8" fill="white"/>
</svg>
